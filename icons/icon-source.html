<!doctype html>
<!--
  앱 아이콘 원본. SVG <text>는 qlmanage/WebKit에서 한글 중앙정렬이 부정확해 폐기했다.
  재생성: Chrome 헤드리스로 이 파일을 512x512 스크린샷 → sips로 192/180 리사이즈.
  translate(3px, 10.5px)는 글리프 사이드베어링·자간 보정값 — 픽셀 바운딩박스 분석으로 산출됨.
-->
<html><head><meta charset="utf-8"><style>
  html, body { margin: 0; width: 512px; height: 512px; overflow: hidden; }
  .icon {
    width: 512px; height: 512px;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(130% 130% at 25% 15%, #16191f 0%, #0b0d10 65%);
  }
  .t {
    font-family: -apple-system, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    font-size: 185px; font-weight: 900; letter-spacing: -6px; line-height: 1;
    background: linear-gradient(90deg, #ffffff 12%, #3ce8a4 88%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    transform: translate(3px, 10.5px);
  }
</style></head><body><div class="icon"><span class="t">1억</span></div></body></html>
